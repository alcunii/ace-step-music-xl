name: Build and Deploy ACE-Step XL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-test.txt

      - name: Install system deps for soundfile
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest test_handler.py test_workflow.py -v

  build-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      sha_tag: ${{ steps.sha-tag.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune -af
          df -h /

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: dmrabh/ace-step-music-xl
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract SHA tag
        id: sha-tag
        run: echo "sha_tag=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"

  deploy:
    needs: build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Announce rollout
        env:
          IMAGE_TAG: dmrabh/ace-step-music-xl:${{ needs.build-push.outputs.sha_tag }}
        run: |
          # Template stays pinned at :latest; new workers pull the new image on
          # next cold-start automatically. Previous saveTemplate-by-id mutation
          # broke when RunPod made name/env/containerDiskInGb/volumeInGb/dockerArgs
          # required on SaveTemplateInput. For pin-to-sha rollouts, update the
          # template imageName in the RunPod UI manually.
          echo "Image pushed: ${IMAGE_TAG}"
          echo "Template ${{ secrets.RUNPOD_TEMPLATE_ID_XL }} points at :latest — next worker cold-start picks up the new image."
